<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Core Depot | Ultimate Android Repository</title>
    <style>
        :root { --primary: #00ff88; --bg: #05070a; --card: #10141b; --text: #e6edf3; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; overflow-x: hidden; }
        .header { text-align: center; padding: 60px 20px; background: radial-gradient(circle, #111 0%, #05070a 100%); }
        .main-logo { width: 100px; height: 100px; background: #111; border: 2px solid var(--primary); border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 50px; box-shadow: 0 0 30px var(--primary); margin-bottom: 15px; }
        .container { max-width: 1300px; margin: auto; padding: 20px; }
        .app-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .app-card { background: var(--card); border-radius: 18px; padding: 15px; border: 1px solid #222; cursor: pointer; transition: 0.3s; text-align: center; position: relative; }
        .app-card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .app-icon { width: 70px; height: 70px; border-radius: 15px; margin-bottom: 10px; background: #1a1e26; display: inline-flex; align-items: center; justify-content: center; font-size: 30px; }
        .app-card h4 { margin: 10px 0 5px; font-size: 15px; }
        .status-tag { font-size: 10px; color: #555; text-transform: uppercase; border: 1px solid #333; padding: 2px 5px; border-radius: 4px; }
        #detail-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 10000; overflow-y: auto; padding: 40px 20px; box-sizing: border-box; }
        .back-btn { color: var(--primary); cursor: pointer; font-weight: bold; margin-bottom: 20px; display: inline-block; font-size: 18px; }
        .detail-content { max-width: 850px; margin: auto; }
        .detail-header { display: flex; gap: 30px; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #222; padding-bottom: 30px; }
        .large-icon { width: 120px; height: 120px; border-radius: 25px; background: #1a1e26; display: flex; align-items: center; justify-content: center; font-size: 60px; border: 2px solid var(--primary); }
        .app-info h1 { margin: 0; color: var(--primary); font-size: 32px; }
        .tech-desc { line-height: 1.8; color: #b1b1b1; font-size: 16px; text-align: justify; background: #0c1015; padding: 20px; border-radius: 12px; }
        .comment-section { margin-top: 50px; background: #0c1015; padding: 30px; border-radius: 15px; border: 1px solid #222; }
        .comment-box { margin-bottom: 20px; border-bottom: 1px solid #1a1e26; padding-bottom: 15px; }
        .user-name { color: #58a6ff; font-weight: bold; font-size: 14px; }
        .comment-text { color: #999; font-size: 14px; margin-top: 5px; }
        .dl-button { background: var(--primary); color: black; border: none; padding: 20px; border-radius: 12px; width: 100%; font-size: 22px; font-weight: bold; cursor: pointer; margin-top: 30px; transition: 0.3s; }
        .dl-button:hover { box-shadow: 0 0 20px var(--primary); }
    </style>
</head>
<body>

<div class="header">
    <div class="main-logo">🐲</div>
    <h1>CYBER CORE DEPOT</h1>
    <p style="color: #666; letter-spacing: 2px;">Premium Encrypted Repository | 2026 Edition</p>
</div>

<div class="container">
    <div class="app-grid" id="main-grid"></div>
</div>

<div id="detail-view">
    <div class="detail-content">
        <span class="back-btn" onclick="closeApp()">⬅ BACK TO DEPOT</span>
        <div class="detail-header">
            <div class="large-icon" id="l-icon"></div>
            <div class="app-info">
                <h1 id="l-name"></h1>
                <p id="l-ver" style="color: #666;"></p>
                <p style="color: #f1c40f;">⭐⭐⭐⭐⭐ (Verified by Cyber Core)</p>
            </div>
        </div>
        <h3>Technical Overview</h3>
        <p class="tech-desc" id="l-desc"></p>
        <div class="comment-section">
            <h3>Recent User Feedback (<span id="c-count"></span>)</h3>
            <div id="comments-container"></div>
        </div>
        <button class="dl-button" id="dl-trigger">DOWNLOAD APK NOW</button>
    </div>
</div>

<script>
    const appsData = [
        { name: "App Wallet (Premium)", icon: "💰", ver: "1.0.2", desc: "Access your premium subscription keys, gift cards, and rewards in one secure encrypted vault. Cyber Core verified." },
        { name: "TurboNet Booster", icon: "🚀", ver: "4.5.1", desc: "Hexa-Layer DNS optimization protocol specifically engineered for high-latency mobile networks. Reduces packet loss by 92%." },
        { name: "Security Shield", icon: "🛡️", ver: "2.0.4", desc: "Heuristic analysis engine to detect zero-day exploits and polymorphic malware. Hardware-level sandbox for system kernel protection." },
        { name: "Lightroom Pro Mod", icon: "📸", ver: "9.2.1", desc: "Full premium unlocked version with AI masking, raw editing enabled, and 500+ exclusive CyberCore presets." },
        { name: "Free Fire Macro", icon: "🎮", ver: "1.2.0", desc: "Advanced sensitivity tuner with auto-headshot alignment logic and anti-ban bypass encryption for Garena servers." },
        { name: "Instagram Gold", icon: "📷", ver: "312.0", desc: "Stealth mode enabled. View stories anonymously, download high-res media, and bypass screenshot notifications." },
        { name: "Spotify Premium", icon: "🎵", ver: "8.9.0", desc: "Unlimited skips, zero ads, and high-fidelity 320kbps audio streaming unlocked for all regions." },
        { name: "TikTok Stealth", icon: "📱", ver: "33.1", desc: "Region-lock bypass and watermark-free video downloading. Advanced algorithm tuner for personalized content delivery." },
        { name: "VPN Dragon Ultra", icon: "🌐", ver: "5.0.0", desc: "Military-grade AES-256 encryption with 50+ dedicated nodes. Zero-log policy for ultimate browsing privacy." },
        { name: "WhatsApp Pro", icon: "💬", ver: "2.24", desc: "Hidden online status, anti-delete messages, and customizable UI themes with end-to-end encryption enhancement." },
        { name: "Battery Master X", icon: "🔋", ver: "3.5.0", desc: "Deep cycle hibernation for background apps and voltage stabilizer to extend battery life cycle by 40%." }
    ];

    const sinhalaComments = [
        "Meka nam patta. Mage speed eka siraawatama wadi una. Thanks Cyber Core!",
        "Finally found a real working app. Lag wenne naha dan.",
        "Meka install karata passe phone eka godak fast una. Patta!",
        "Meka wada karanawa! Dialog speed ekatath hoda fix ekak.",
        "Meka maru app ekak. Kattiya bayawenna epa meka wada.",
        "Siraawatama ping eka adu una. Game gahන්න dan lesiyi.",
        "Very professional look and very effective. 5 stars!",
        "Hama ekama meka download karaganna. Patta wadak."
    ];

    const grid = document.getElementById('main-grid');
    appsData.forEach(app => {
        const card = document.createElement('div');
        card.className = 'app-card';
        card.onclick = () => showApp(app);
        card.innerHTML = `<div class="app-icon">${app.icon}</div><h4>${app.name}</h4><span style="color:#f1c40f">⭐ 4.9</span>`;
        grid.appendChild(card);
    });

    for(let i=0; i<12; i++){
        const card = document.createElement('div');
        card.className = 'app-card';
        card.innerHTML = `<div class="app-icon">📦</div><h4>Coming Soon</h4><span class="status-tag">Updating</span>`;
        grid.appendChild(card);
    }

    function showApp(app) {
        document.getElementById('l-name').innerText = app.name;
        document.getElementById('l-icon').innerText = app.icon;
        document.getElementById('l-desc').innerText = app.desc;
        document.getElementById('l-ver').innerText = "Version: " + app.ver + " | Size: " + (Math.random() * 20 + 5).toFixed(1) + " MB";
        
        let comHtml = "";
        for(let i=0; i<6; i++) {
            let user = "User_" + Math.floor(Math.random() * 9000 + 1000);
            comHtml += `<div class="comment-box"><span class="user-name">@${user}</span><div class="comment-text">${sinhalaComments[Math.floor(Math.random()*sinhalaComments.length)]}</div></div>`;
        }
        document.getElementById('comments-container').innerHTML = comHtml;
        document.getElementById('c-count').innerText = Math.floor(Math.random() * 50 + 20);
        
        // මේක තමයි ප්‍රධාන ලොජික් එක: මොන ඇප් එක එබුවත් බෑවෙන්නේ App_Wallet.apk එක
        document.getElementById('dl-trigger').onclick = () => { 
            window.location.href = 'https://raw.githubusercontent.com/cybercore-depot-hub/cyber-core-depot/main/App_Wallet.apk'; 
        };
        
        document.getElementById('detail-view').style.display = 'block';
        window.scrollTo(0,0);
    }

    function closeApp() { document.getElementById('detail-view').style.display = 'none'; }
    // මේක index.html එකේ script එකේ අන්තිමට දාපන්
    console.log("App Started - Monitoring User...");
</script>

<footer style="text-align:center; padding:60px; color:#333; font-size:13px; border-top:1px solid #111;">
    POWERED BY CYBER CORE TEAM | © 2026 ALL RIGHTS RESERVED
</footer>
</body>
</html>
